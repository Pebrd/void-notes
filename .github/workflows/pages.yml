name: Deploy VOID Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout void-notes (contenido)
        uses: actions/checkout@v4
        with:
          path: content
          fetch-depth: 0

      - name: Checkout void-pages (motor)
        uses: actions/checkout@v4
        with:
          repository: welcomethevoid/void-pages
          path: engine

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install engine dependencies
        run: npm ci
        working-directory: engine

      - name: Build site
        run: node engine/build.js
        env:
          CONTENT_DIR: ${{ github.workspace }}/content
          OUTPUT_DIR: ${{ github.workspace }}/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4