En el `pages.yml` de `void-notes`, reemplazar todo el contenido por esto:

```yaml
name: Deploy VOID Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout void-notes
        uses: actions/checkout@v4
        with:
          path: content
          fetch-depth: 0
      - name: Checkout void-pages
        uses: actions/checkout@v4
        with:
          repository: welcomethevoid/void-pages
          path: engine
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install engine dependencies
        run: npm ci
        working-directory: engine
      - name: Build site
        run: node engine/build.js
        env:
          CONTENT_DIR: ${{ github.workspace }}/content
          OUTPUT_DIR: ${{ github.workspace }}/dist
          BASE_PATH: /void-notes
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
```

Y también pasale al agente que en la constante `PAGES_WORKFLOW` de Kotlin, las variables de GitHub Actions tienen que escaparse como `${'$'}{{ }}` para que Kotlin no las interprete — eso ya lo tenía bien, el problema es que ese escape tiene que desaparecer en el archivo final. La solución correcta en Kotlin es usar una raw string o escapar solo el `$`:

```kotlin
CONTENT_DIR: ${"$"}{{ github.workspace }}/content
```

O más simple, reemplazar `${'$'}` por `${"$"}` en toda la constante.
